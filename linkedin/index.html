<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FLG — LinkedIn Swipe File</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #171d2f;
      --gold:   #d3b764;
      --cream:  #efede8;
      --white:  #ffffff;
      --text:   #171d2f;
      --muted:  #6b7280;
      --border: #e2ddd6;
      --tag-cpa-bg: #fff8e6;
      --tag-cpa-color: #a07b1e;
      --tag-broad-bg: #e8f0ff;
      --tag-broad-color: #2d62ff;
      --tag-both-bg: #eef6ee;
      --tag-both-color: #2a7c2a;
    }

    body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

    /* ── HEADER ── */
    header {
      background: var(--navy);
      padding: 16px 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo { height: 32px; filter: brightness(0) invert(1); }
    .header-divider { width: 1px; height: 26px; background: rgba(211,183,100,0.4); }
    .header-title { color: #fff; font-size: 15px; font-weight: 600; }
    .header-subtitle { color: var(--gold); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }

    /* ── TAB NAV ── */
    .tab-nav {
      background: var(--navy);
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 0 36px;
      display: flex;
      gap: 0;
    }
    .tab-btn {
      padding: 11px 20px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.45);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-btn:hover:not(.active) { color: rgba(255,255,255,0.7); }
    .tab-count {
      background: rgba(211,183,100,0.2);
      color: var(--gold);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 10px;
      font-weight: 600;
    }
    .add-btn {
      margin-left: auto;
      align-self: center;
      background: var(--gold);
      color: var(--navy);
      border: none;
      padding: 8px 16px;
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }
    .add-btn:hover { background: #e8ca74; }
    .add-btn svg { width: 13px; height: 13px; }

    /* ── STATS BAR ── */
    .stats-bar {
      background: #111623;
      padding: 8px 36px;
      display: flex;
      gap: 28px;
    }
    .stat { display: flex; align-items: center; gap: 7px; font-size: 11px; color: rgba(255,255,255,0.45); }
    .stat strong { color: var(--gold); font-size: 14px; font-weight: 700; }

    /* ── TAB PANELS ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ════════════════════
       PROFILES TAB
    ════════════════════ */
    .toolbar {
      padding: 20px 36px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
    .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); width: 14px; height: 14px; pointer-events: none; }
    .search-input { width: 100%; padding: 8px 10px 8px 32px; border: 1.5px solid var(--border); border-radius: 7px; font-family: 'Inter', sans-serif; font-size: 13px; background: #fff; color: var(--text); outline: none; }
    .search-input:focus { border-color: var(--navy); }
    .filter-btns { display: flex; gap: 5px; }
    .filter-btn { padding: 7px 13px; border-radius: 7px; border: 1.5px solid var(--border); background: #fff; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--muted); transition: all 0.15s; }
    .filter-btn.active, .filter-btn:hover { border-color: var(--navy); background: var(--navy); color: #fff; }

    .grid { padding: 10px 36px 60px; display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; }

    .card { background: #fff; border-radius: 12px; border: 1.5px solid var(--border); padding: 18px; display: flex; flex-direction: column; gap: 12px; transition: box-shadow 0.15s, transform 0.15s; }
    .card:hover { box-shadow: 0 4px 18px rgba(23,29,47,0.09); transform: translateY(-1px); }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .card-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--navy); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; flex-shrink: 0; }
    .card-info { flex: 1; }
    .name-input { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; color: var(--text); border: none; background: transparent; width: 100%; outline: none; padding: 2px 4px; border-radius: 4px; transition: background 0.15s; }
    .name-input:hover, .name-input:focus { background: var(--cream); }
    .card-actions { display: flex; gap: 3px; }
    .icon-btn { width: 27px; height: 27px; border-radius: 6px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--muted); transition: all 0.15s; }
    .icon-btn:hover { background: var(--cream); color: var(--text); }
    .icon-btn.delete:hover { background: #fee2e2; color: #dc2626; }
    .icon-btn.posts-btn:hover { background: #e8f0ff; color: #2d62ff; }
    .icon-btn svg { width: 14px; height: 14px; }

    .tag-row { display: flex; align-items: center; gap: 8px; }
    .tag-select { border: none; border-radius: 20px; padding: 3px 10px; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; outline: none; appearance: none; -webkit-appearance: none; }
    .tag-select.cpa   { background: var(--tag-cpa-bg);   color: var(--tag-cpa-color); }
    .tag-select.broad { background: var(--tag-broad-bg); color: var(--tag-broad-color); }
    .tag-select.both  { background: var(--tag-both-bg);  color: var(--tag-both-color); }

    .url-row { display: flex; align-items: center; gap: 5px; }
    .url-input { flex: 1; font-family: 'Inter', sans-serif; font-size: 12px; color: var(--muted); border: 1.5px solid var(--border); border-radius: 6px; padding: 5px 9px; outline: none; background: var(--cream); transition: border-color 0.15s; }
    .url-input:focus { border-color: var(--navy); background: #fff; }
    .li-link { flex-shrink: 0; width: 28px; height: 28px; border-radius: 6px; background: #0a66c2; color: #fff; display: flex; align-items: center; justify-content: center; text-decoration: none; transition: background 0.15s; }
    .li-link:hover { background: #004182; }
    .li-link svg { width: 13px; height: 13px; }

    .notes-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 3px; }
    .notes-textarea { width: 100%; font-family: 'Inter', sans-serif; font-size: 12px; color: var(--text); border: 1.5px solid var(--border); border-radius: 6px; padding: 7px 9px; outline: none; resize: none; background: var(--cream); min-height: 58px; line-height: 1.5; transition: border-color 0.15s; }
    .notes-textarea:focus { border-color: var(--navy); background: #fff; }
    .notes-textarea::placeholder { color: #bbb; }

    /* View posts link */
    .view-posts-link { font-size: 11px; color: #2d62ff; cursor: pointer; font-weight: 500; text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .view-posts-link:hover { text-decoration: underline; }

    /* ════════════════════
       POSTS TAB
    ════════════════════ */
    .posts-layout { display: flex; min-height: calc(100vh - 120px); }

    /* Sidebar */
    .posts-sidebar {
      width: 220px;
      flex-shrink: 0;
      padding: 20px 16px;
      border-right: 1px solid var(--border);
      background: #fff;
      position: sticky;
      top: 96px;
      height: calc(100vh - 96px);
      overflow-y: auto;
    }
    .sidebar-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 10px; padding: 0 4px; }
    .sidebar-profile {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s;
      margin-bottom: 2px;
    }
    .sidebar-profile:hover { background: var(--cream); }
    .sidebar-profile.active { background: #e8f0ff; }
    .sidebar-profile.active .sp-name { color: #2d62ff; font-weight: 600; }
    .sp-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--navy); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .sp-name { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.3; }
    .sp-count { margin-left: auto; font-size: 10px; color: var(--muted); background: var(--cream); border-radius: 10px; padding: 1px 6px; }

    /* Posts feed */
    .posts-feed { flex: 1; padding: 20px 28px 60px; max-width: 780px; }

    .posts-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
    .posts-search-wrap { position: relative; flex: 1; min-width: 200px; }
    .posts-search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); width: 14px; height: 14px; pointer-events: none; }
    .posts-search { width: 100%; padding: 8px 10px 8px 32px; border: 1.5px solid var(--border); border-radius: 7px; font-family: 'Inter', sans-serif; font-size: 13px; background: #fff; outline: none; }
    .posts-search:focus { border-color: var(--navy); }

    .hook-filters { display: flex; gap: 5px; flex-wrap: wrap; }
    .hook-filter { padding: 5px 11px; border-radius: 20px; border: 1.5px solid var(--border); background: #fff; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500; cursor: pointer; color: var(--muted); transition: all 0.15s; }
    .hook-filter.active, .hook-filter:hover { background: var(--navy); border-color: var(--navy); color: #fff; }

    .post-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 14px;
      transition: box-shadow 0.15s;
    }
    .post-card:hover { box-shadow: 0 3px 16px rgba(23,29,47,0.08); }
    .post-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .post-profile-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--navy); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .post-profile-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .post-meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; flex-wrap: wrap; }
    .post-tag { font-size: 10px; font-weight: 600; border-radius: 10px; padding: 2px 8px; }
    .post-tag.cpa   { background: var(--tag-cpa-bg);   color: var(--tag-cpa-color); }
    .post-tag.broad { background: var(--tag-broad-bg); color: var(--tag-broad-color); }
    .post-tag.both  { background: var(--tag-both-bg);  color: var(--tag-both-color); }
    .hook-badge { font-size: 10px; font-weight: 600; background: #f3f0ea; color: var(--muted); border-radius: 10px; padding: 2px 8px; }
    .post-date { font-size: 11px; color: #aaa; margin-left: auto; }

    .post-text {
      font-size: 13px;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
      margin-bottom: 14px;
    }
    .post-text.collapsed { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    .expand-btn { font-size: 11px; color: #2d62ff; cursor: pointer; font-weight: 500; background: none; border: none; padding: 0; font-family: 'Inter', sans-serif; margin-bottom: 12px; }
    .expand-btn:hover { text-decoration: underline; }

    .post-footer { display: flex; align-items: center; gap: 10px; padding-top: 12px; border-top: 1px solid var(--border); }
    .engagement-text { font-size: 11px; color: var(--muted); flex: 1; }
    .li-open-btn { font-size: 11px; color: #0a66c2; text-decoration: none; display: flex; align-items: center; gap: 4px; font-weight: 500; }
    .li-open-btn:hover { text-decoration: underline; }
    .li-open-btn svg { width: 12px; height: 12px; }

    .posts-empty { text-align: center; padding: 80px 20px; color: var(--muted); }
    .posts-empty svg { width: 44px; height: 44px; opacity: 0.25; margin-bottom: 12px; }
    .posts-empty p { font-size: 14px; }

    /* ── MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(23,29,47,0.5); z-index: 300; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 14px; padding: 26px; width: 400px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal h3 { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 18px; }
    .modal label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .modal input, .modal select { width: 100%; padding: 9px 11px; border: 1.5px solid var(--border); border-radius: 7px; font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text); background: #fff; outline: none; margin-bottom: 12px; }
    .modal input:focus, .modal select:focus { border-color: var(--navy); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .btn-cancel { padding: 9px 16px; border-radius: 7px; border: 1.5px solid var(--border); background: #fff; font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; color: var(--muted); }
    .btn-save { padding: 9px 18px; border-radius: 7px; border: none; background: var(--navy); color: #fff; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-save:hover { background: #232c47; }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 22px; right: 22px; background: var(--navy); color: #fff; padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 7px; opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; z-index: 400; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast svg { width: 13px; height: 13px; color: var(--gold); }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      header { padding: 12px 16px; }
      .header-title { font-size: 13px; }
      .header-subtitle { font-size: 10px; }
      .logo { height: 26px; }

      .tab-nav { padding: 0 12px; gap: 0; overflow-x: auto; }
      .tab-btn { padding: 10px 14px; font-size: 12px; white-space: nowrap; }
      .add-btn { padding: 7px 11px; font-size: 11px; margin-left: 8px; }

      .stats-bar { padding: 8px 16px; gap: 14px; flex-wrap: wrap; }
      .stat { font-size: 10px; }
      .stat strong { font-size: 12px; }

      .toolbar { padding: 14px 16px 8px; gap: 8px; }
      .search-wrap { max-width: 100%; }
      .filter-btns { flex-wrap: wrap; }
      .filter-btn { padding: 6px 10px; font-size: 11px; }

      .grid { padding: 8px 16px 40px; grid-template-columns: 1fr; gap: 10px; }

      /* Posts tab: stack sidebar above feed on mobile */
      .posts-layout { flex-direction: column; min-height: unset; }
      .posts-sidebar {
        width: 100%;
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        overflow-x: auto;
        overflow-y: visible;
      }
      /* Sidebar profiles go horizontal on mobile */
      .posts-sidebar > div:last-of-type { display: flex; flex-direction: row; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
      .sidebar-profile { flex-shrink: 0; padding: 6px 10px; }
      .sp-count { display: none; }

      .posts-feed { padding: 14px 16px 40px; max-width: 100%; }
      .posts-toolbar { gap: 8px; }
      .hook-filters { gap: 4px; }
      .hook-filter { padding: 4px 9px; font-size: 10px; }

      .post-card { padding: 14px; }
      .post-card-header { gap: 8px; margin-bottom: 10px; }
      .post-date { font-size: 10px; }
      .post-text { font-size: 12px; }

      .modal { padding: 20px 16px; width: calc(100vw - 32px); }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <img class="logo" src="https://cdn.prod.website-files.com/6976b5d8583aa3a848209b11/6976b5d8583aa3a848209c2a_69769aa2ab114890882c7409_7c0ee983-55ae-40b6-92b3-547bf4ddcefc%20(2).png" alt="FLG" onerror="this.style.display='none'"/>
    <div class="header-divider"></div>
    <div>
      <div class="header-title">LinkedIn Swipe File</div>
      <div class="header-subtitle">Founder Legacy Group</div>
    </div>
  </div>
</header>

<!-- TAB NAV + STATS -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('profiles', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/><circle cx="19" cy="7" r="2"/><path d="M22 21v-1a2 2 0 00-2-2h-1"/></svg>
    Profiles
    <span class="tab-count" id="tc-profiles">16</span>
  </button>
  <button class="tab-btn" onclick="switchTab('posts', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Inspiration Posts
    <span class="tab-count" id="tc-posts">9</span>
  </button>
  <button class="add-btn" id="add-btn-header" onclick="openModal()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Profile
  </button>
</div>

<div class="stats-bar">
  <div class="stat"><strong id="stat-total">0</strong> Profiles</div>
  <div class="stat"><strong id="stat-cpa">0</strong> CPA</div>
  <div class="stat"><strong id="stat-broad">0</strong> Broad</div>
  <div class="stat"><strong id="stat-both">0</strong> Both</div>
  <div class="stat"><strong id="stat-posts">0</strong> Saved Posts</div>
</div>

<!-- ══ PROFILES TAB ══ -->
<div class="tab-panel active" id="panel-profiles">
  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" type="text" placeholder="Search profiles..." oninput="renderProfiles()" id="search-input"/>
    </div>
    <div class="filter-btns">
      <button class="filter-btn active" data-filter="all"   onclick="setFilter('all',this)">All</button>
      <button class="filter-btn"        data-filter="cpa"   onclick="setFilter('cpa',this)">CPA</button>
      <button class="filter-btn"        data-filter="broad" onclick="setFilter('broad',this)">Broad</button>
      <button class="filter-btn"        data-filter="both"  onclick="setFilter('both',this)">Both</button>
    </div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- ══ POSTS TAB ══ -->
<div class="tab-panel" id="panel-posts">
  <div class="posts-layout">

    <!-- Sidebar -->
    <div class="posts-sidebar">
      <div class="sidebar-label">Filter by Profile</div>
      <div class="sidebar-profile active" data-profile-filter="all" onclick="setPostsProfileFilter('all', this)">
        <div class="sp-avatar" style="font-size:9px;">ALL</div>
        <div class="sp-name">All Profiles</div>
        <span class="sp-count" id="sc-all">0</span>
      </div>
      <div id="sidebar-profiles"></div>
    </div>

    <!-- Feed -->
    <div class="posts-feed">
      <div class="posts-toolbar">
        <div class="posts-search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="posts-search" type="text" placeholder="Search posts..." oninput="renderPosts()" id="posts-search"/>
        </div>
        <div class="hook-filters" id="hook-filters">
          <button class="hook-filter active" data-hook="all" onclick="setHookFilter('all',this)">All Hooks</button>
        </div>
      </div>
      <div id="posts-feed-list"></div>
    </div>
  </div>
</div>

<!-- ADD PROFILE MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Add New Profile</h3>
    <label>Name</label>
    <input type="text" id="m-name" placeholder="e.g. Alex Hormozi"/>
    <label>LinkedIn URL</label>

  { id: 'post_3_1774963053213', profileId: 3, profile: 'Brent Beshore', tag: 'broad', hook: 'Bold Statement', text: 'What a BLESSING! Thank you, Main Street Summit, (and our buddy Brent Beshore), for an AMAZING Field Trip to see Ray Hayles and team at Walker Lumber in Nashville, TN.  If you want transformation, the best thing we have found to get that is an EXPERIENCE. That\'s what these FIELD TRIPS are all about, Ash Marsh and I were blown away at what the Good Lord is doing in the lumber business that focuses on Loving People! (Below a small takeaway)  *The Business Plan Was Faithfulness* At some point during Walker\'s run, a banker friend, a dude Ray had known since seventh grade, sat down to renew their line of credit. He asked the obligatory question: What\'s your business plan this year? Ray looked at him. "I said, write this down. Our business plan is to wake up and be faithful." The banker looked up. Ray continued: "We cannot control interest rates. We cannot control who walks in that door. Bu', likes: '43', comments: '8', url: 'https://www.linkedin.com/in/brentbeshore/', date: 'Mar 2026' },

  { id: 'post_5_1774963053217', profileId: 5, profile: 'Sara Blakely', tag: 'broad', hook: 'Bold Statement', text: 'Happy  hashtag #WorldDownSyndromeDay from NDSS! 🌎 Whether you\'re  hashtag #RacingFor321 with us, wearing eye-catching socks, or honoring the day in your own way, we\'re glad you\'re here and part of our community!  The work we do to create a world where individuals with Down syndrome 𝒕𝒉𝒓𝒊𝒗𝒆 is possible because of you. Give today at ndss.org/donate to help us continue this vital work. 💙💛', likes: '293', comments: '3', url: 'https://www.linkedin.com/in/sarablakely/', date: 'Mar 2026' },
  { id: 'post_5_1774963053218', profileId: 5, profile: 'Sara Blakely', tag: 'broad', hook: 'Bold Statement', text: 'March is Developmental Disabilities Awareness Month, a time to recognize the strengths, talents, and contributions of people with developmental disabilities and to promote inclusion across education, employment, recreation, and community life. At TERI Campus of Life, we\'re proud to support this effort by building innovative programs that create opportunities for individuals with developmental disabilities at every stage of life. This month and every month, we celebrate progress and continue working toward communities where everyone belongs. hashtag #DevelopmentalDisabilitiesAwarenessMonth  hashtag #TERICampusofLife  hashtag #InclusiveCommunities', likes: '21', comments: '0', url: 'https://www.linkedin.com/in/sarablakely/', date: 'Mar 2026' },
  { id: 'post_5_1774963053219', profileId: 5, profile: 'Sara Blakely', tag: 'broad', hook: 'Bold Statement', text: 'Now hiring a General Manager for our Employee Store in Portland. Join us in leading one of Columbia’s most iconic locations, situated next to our global headquarters. This vibrant community includes employees, partners, and local organizations who shop at the Employee Store year-round. This 50,000 sq. ft. retail environment, featuring 32,000 sq. ft. of sales floor, provides an opportunity to collaborate closely with fellow Store and General Managers in a highly cooperative setting. We seek a leader who thrives in fast-paced retail, builds strong and accountable teams, and embodies Gert Boyle’s spirit of “It’s perfect. Now make it better.” If you’re ready to shape the experience for our passionate employee and partner community—and lead a team that lives “Tested Tough”—this is your mountain. Apply today!', likes: '60', comments: '1', url: 'https://www.linkedin.com/in/sarablakely/', date: 'Mar 2026' },

  { id: 'post_5_1774963053221', profileId: 5, profile: 'Sara Blakely', tag: 'broad', hook: 'Bold Statement', text: 'We are currently looking to hire a Retail Supervsior and I am so excited to bring another leader onto my team this year!  If you know anyone who might be interested in this role or ready to elevate their retail leadership experience please send them our way or share this post within your network!  Kirsten Schertzer John Charles Mendoza Sara Blakely SANDY LUNA-NAVARRO', likes: '12', comments: '0', url: 'https://www.linkedin.com/in/sarablakely/', date: 'Mar 2026' },
  { id: 'post_7_1774963053222', profileId: 7, profile: 'Walker Deibel', tag: 'cpa', hook: 'Bold Statement', text: 'Allocating capital is not the same as architecting it. Last week, I broke down the difference and revealed the Capital Velocity Stack: a model that turns the movement of capital among the income, leverage, and deployment layers into a system that compounds $2.5M into $10M over 10 years. But I left something out on purpose. Each time you move capital between layers, you trigger taxable events. Interest income. Capital gains. The friction compounds. Tax drag is the silent killer of portfolio architecture. But there’s a way to eliminate it for good. If you want to know how, join 400k+ subscribers navigating the private markets with Wealth Stack Weekly 👇  www.wealthstackweekly.com', likes: '120', comments: '15', url: 'https://www.linkedin.com/in/walkerdeibel/', date: 'Mar 2026' },
  { id: 'post_7_1774963053223', profileId: 7, profile: 'Walker Deibel', tag: 'cpa', hook: 'Question', text: 'Is it normal to feel underqualified looking at deals? A guy told me about his 1st morning after buying a company with a 7-figure personal guarantee. The management team met in the conference room every morning for a huddle. On day 1, he walked in, said "Hold on, I\'ll be right back," went into his office bathroom, and had the loudest stress-induced diarrhea of his life. Then he walked back out to the meeting. Only to realize the bathroom shared a wall with the conference room. That\'s ownership. The nausea. The sweating. The physical jolt of realizing, "Oh. This is mine now." So, is it normal to feel underqualified looking at deals? Yes. And if you don\'t feel underqualified at some point, you\'re probably not looking at a real deal. Most 1st-time buyers assume the feeling means they\'re missing something. More education. More reps. More readiness. They think if they just study enough P&', likes: '134', comments: '21', url: 'https://www.linkedin.com/in/walkerdeibel/', date: 'Mar 2026' },
  { id: 'post_7_1774963053224', profileId: 7, profile: 'Walker Deibel', tag: 'cpa', hook: 'Bold Statement', text: 'Women are outperforming men in investing. But they\'re still underrepresented in the best-performing asset classes. Especially private markets. And the reason has nothing to do with skill. The wealth shift is massive. Women controlled $39 trillion in 2018. Nearly $60 trillion today. Projected to exceed $113 trillion by 2030. In the U.S., that number doubles from $18 trillion to $34 trillion. 69% of women are already the primary investment decision-maker in their household. So what does the behavioral data actually say? Men trade 45% more frequently. That costs them roughly 1.4% per year in net returns. Women trade less, not from hesitation, but from lower overconfidence bias. They are 45% less likely to log in during downturns and far less likely to panic-sell. The industry calls this "risk averse." The accurate term is risk calibrated. Public markets reward speed and constant activi', likes: '151', comments: '13', url: 'https://www.linkedin.com/in/walkerdeibel/', date: 'Mar 2026' },
  { id: 'post_7_1774963053225', profileId: 7, profile: 'Walker Deibel', tag: 'cpa', hook: 'Bold Statement', text: 'Yesterday we opened Radical Surfaces’ US factory in Dallas. A year ago, this was leased space. Today, it’s a fully operational facility producing next-gen engineered stone at scale. Radical Surfaces was our first major private equity project as a community and remains one of our most ambitious to date.  This is one of those moments when the power of our community is undeniable. Remember:  Deploying capital is about more than just ROI.  It builds real things. Grateful to be there with the team and investors who made it happen:  Mike Brown Oren Klaff Nate Woodman Jeremiah Rivers Jennings Lawton DePriest I Brian File Anna Bowers Guy Bar-Ner', likes: '248', comments: '44', url: 'https://www.linkedin.com/in/walkerdeibel/', date: 'Mar 2026' },
  { id: 'post_7_1774963053226', profileId: 7, profile: 'Walker Deibel', tag: 'cpa', hook: 'Stat/Fact', text: 'Shane Ehrsam was laid off in September 2021. 9 months later, he owns a $9.5 million trailer dealership. No private equity background. No prior deal experience. Then he read Buy Then Build. Joined Acquisition Lab in November 2021. By June 2022, he closed on North Texas Trailers. It\'s a full-service work trailer dealership in Dallas-Fort Worth. Not semis. Not RVs. Trailers you pull with a pickup truck. More work trailers are sold in DFW than anywhere else in the country. I visited the dealership, and the first thing I noticed was the tenure. Terry, 35 years working on trailers. Manny, 12 years. Michelle and Sergio have been together for over a decade. That kind of expertise is hard to replicate. Shane\'s first move after closing was not to cut costs. It was to invest in the people. Added healthcare. Added a 401k. Put every employee on incentive-based pay. Grew from 15 to 24 employees. ', likes: '297', comments: '30', url: 'https://www.linkedin.com/in/walkerdeibel/', date: 'Mar 2026' },

  { id: 'post_12_1774963053233', profileId: 12, profile: 'Erik Solbakken', tag: 'cpa', hook: 'Contrarian', text: '“Food has become religion… and people defend it like belief.” Let that sink in. 👀 In this clip, Robert Saik breaks down why food choices aren’t just about health anymore… They’re about identity. Vegan. Keto. Organic. Carnivore. Different labels, same pattern: belief systems shaping behavior. But what happens when we stop following the story… and start asking better questions? 🎧 Listen now: https://lnkd.in/g329c6JY Also available on Spotify, Apple Podcasts, and more. hashtag #FoodIsReligion  hashtag #MindsetShift  hashtag #ConsciousLiving  hashtag #VikingAcademy  hashtag #RobertSaik  hashtag #CriticalThinking  hashtag #HealthTruth  hashtag #SelfAwareness  hashtag #WakeUp', likes: '0', comments: '0', url: 'https://www.linkedin.com/in/eriksolbakken/', date: 'Mar 2026' },
  { id: 'post_12_1774963053234', profileId: 12, profile: 'Erik Solbakken', tag: 'cpa', hook: 'Bold Statement', text: '“Organic food… can be created using radiation and carcinogenic chemicals.” Wait, what?! 👀 In this clip, Robert Saik exposes a truth most people never question: Some “organic” farming methods still involve lab-based processes, while more precise technologies get labeled as dangerous. So what are we actually paying for? And how much of it is just… a story? 🎧 Listen now: https://lnkd.in/g329c6JY Also available on Spotify, Apple Podcasts, and more. hashtag #FoodTruth  hashtag #OrganicMyths  hashtag #GMODebate  hashtag #VikingAcademy  hashtag #RobertSaik  hashtag #ConsciousConsumption  hashtag #HealthTruth  hashtag #FoodAwareness  hashtag #MindBlown', likes: '2', comments: '0', url: 'https://www.linkedin.com/in/eriksolbakken/', date: 'Mar 2026' },
  { id: 'post_12_1774963053235', profileId: 12, profile: 'Erik Solbakken', tag: 'cpa', hook: 'Bold Statement', text: 'Most accountants build their firm first… …and only later think about profit. That’s backwards. Start with the end in mind. How much do you want to make? How much time do you want? What kind of clients do you want? Then build your firm around that. If you don’t define it upfront, you’ll end up with a business that runs you. I break this down in this week’s Accounting Success Tip: 👉 https://lnkd.in/g6eEj6dp hashtag #Accounting  hashtag #CPA  hashtag #AccountingFirm  hashtag #FirmOwner  hashtag #AccountantLife  hashtag #AccountantSuccessFormula', likes: '4', comments: '2', url: 'https://www.linkedin.com/in/eriksolbakken/', date: 'Mar 2026' },
  { id: 'post_12_1774963053236', profileId: 12, profile: 'Erik Solbakken', tag: 'cpa', hook: 'Stat/Fact', text: '97% of CPA Firm Owners Will Never Build a Scalable, Profitable Firm That Runs Without Them  Are you in the 3% who will? Most CPAs are trapped in the billable hour grind, buried in compliance work, and are afraid to take risks. But a rare few think and act like entrepreneurs—and they’re the ones building firms that give them true freedom. I coach only those CPA firm owners—the 3% who refuse to settle for owning a job. Escape the billable hour model & create high-value advisory services Build a firm that runs without you (so you can actually enjoy life) Attract premium clients who value your expertise Transform your firm into a true business asset I take on only a handful of private coaching clients at a time. If you\'re a growth-minded CPA who wants to scale beyond just doing tax & compliance work, let\'s talk. DM me or apply here → www.eriksolbakkencpa.com', likes: '10', comments: '3', url: 'https://www.linkedin.com/in/eriksolbakken/', date: 'Mar 2026' },
  { id: 'post_12_1774963053237', profileId: 12, profile: 'Erik Solbakken', tag: 'cpa', hook: 'Bold Statement', text: 'Thank you Tim Miron, CPA, CA for sharing. It’s incredible to see you protecting family time during tax season and building a firm that serves your life, not the other way around. Honoured to be in your corner. hashtag #AccountantSuccessFormula  hashtag #TaxSeason  hashtag #ItsWellWorthThePursuit', likes: '3', comments: '0', url: 'https://www.linkedin.com/in/eriksolbakken/', date: 'Mar 2026' },
  { id: 'post_13_1774963053238', profileId: 13, profile: 'Roman Villard', tag: 'cpa', hook: 'Bold Statement', text: 'It was just a normal Friday until Tyler Otto 👀 MBA showed up to HQ. It’s crazy to have to say it out loud, considering it should just be normal, but spending time with people IRL is so much better than virtual. Tyler and I got to banter on a recent episode of the UnAccountable Podcast, which was super fun, but in person we got to riff on the industry, tech, and upcoming conferences. Now that should’ve been a podcast episode. Stoked about the energy that this guy brings to the accounting world. Top notch. Good to see you brother!', likes: '25', comments: '1', url: 'https://www.linkedin.com/in/rdvcpa/', date: 'Mar 2026' },
  { id: 'post_13_1774963053239', profileId: 13, profile: 'Roman Villard', tag: 'cpa', hook: 'Bold Statement', text: 'I\'ve had a lot of wild things happen in my career. A few of them: Closed a deal with someone I met from a Craigslist deal Started my career at an accounting firm on an all-inclusive ski trip Won \'free\' products from a client for beating their "best in office" in a table tennis match - cannab*s industry (still have it, no use for me...but cool) Worked with several sports franchise owners in their penthouse offices Lost two jobs in one day - offer revoked from one and quit the other Started a company as my first kid turned 1...yeah, that was wild Was told I won the deal because I look like justin timberlake Outside of winning a deal because of my doppleganger, just about every other wild, weird, or unexpected turn has been because I took a perceived \'risk\' or stepped outside of my comfort zone... Asking to work on specific clients, asking prodding questions beyond typical small tal', likes: '69', comments: '20', url: 'https://www.linkedin.com/in/rdvcpa/', date: 'Mar 2026' },
  { id: 'post_13_1774963053240', profileId: 13, profile: 'Roman Villard', tag: 'cpa', hook: 'Bold Statement', text: 'somebody on my team just told me "thanks for all of your hard work." kind of funny reflecting on that comment because as a leader of people the last number of years, it\'s pretty rare to get that kind of unsolicited feedback on my job performance. i mean i guess it happens sometimes on specific situations, but i brush it off because it\'s just my job. (note to team - no, please don\'t take this and over index on having to provide unsolicited positive feedback for my fragile ego, it makes me feel uncomfortable lol) it kind of made me a feel little sentimental to hear that appreciation though. it\'s nice to be nice, ya know, and sometimes just say the nice things that pop into your brain.', likes: '28', comments: '8', url: 'https://www.linkedin.com/in/rdvcpa/', date: 'Mar 2026' },
  { id: 'post_13_1774963053241', profileId: 13, profile: 'Roman Villard', tag: 'cpa', hook: 'Bold Statement', text: 'We\'re no longer in the age of SOCIAL media. We\'re in the age of INTEREST media. Your cousin\'s post from their night on the town - not going to show up first because they\'re your cousin. The kale smoothie recipe video is going to show up because that\'s what you\'ve demonstrated you\'re into. The system prioritizes your: Likes Comments Shares Clicks Lingering Even on the posts that grind your gears a little bit...the fact that you spent a little more time on them means you\'ll probably see more from that category or person. So what does this mean for your socials? It doesn\'t matter how many followers you have. It doesn\'t matter how frequently you post. It only matters that you post stuff that other people find interesting. Stuff that actually make people want to stop scrolling for 4 seconds. I\'ve seen this happen over the last 6 months with my feed... So long are most of the accounting ', likes: '15', comments: '8', url: 'https://www.linkedin.com/in/rdvcpa/', date: 'Mar 2026' },

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let profiles = [];
let posts    = [];
let nextId   = 200;
let activeFilter = "all";
let activePostsProfile = "all";
let activeHookFilter = "all";

// ════════════════════════════════════════
//  PERSISTENCE
// ════════════════════════════════════════
function load() {
  try {
    const saved = localStorage.getItem("flg_swipe_v2");
    if (saved) {
      const d = JSON.parse(saved);
      profiles = d.profiles || DEFAULT_PROFILES;
      posts    = d.posts    || DEFAULT_POSTS;
      nextId   = d.nextId   || 200;
    } else {
      profiles = DEFAULT_PROFILES;
      posts    = DEFAULT_POSTS;
    }
  } catch(e) {
    profiles = DEFAULT_PROFILES;
    posts    = DEFAULT_POSTS;
  }
}

function save() {
  localStorage.setItem("flg_swipe_v2", JSON.stringify({ profiles, posts, nextId }));
  showToast();
}

function showToast() {
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}

// ════════════════════════════════════════
//  TABS
// ════════════════════════════════════════
function switchTab(tab, btn) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("panel-" + tab).classList.add("active");
  const addBtn = document.getElementById("add-btn-header");
  addBtn.style.display = tab === "profiles" ? "flex" : "none";
  if (tab === "posts") renderSidebar();
}

// ════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════
function initials(name) {
  return (name||"?").trim().split(/\s+/).map(w=>w[0]).join("").substring(0,2).toUpperCase();
}
function escHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function updateStats() {
  document.getElementById("stat-total").textContent = profiles.length;
  document.getElementById("stat-cpa").textContent   = profiles.filter(p=>p.tag==="cpa").length;
  document.getElementById("stat-broad").textContent = profiles.filter(p=>p.tag==="broad").length;
  document.getElementById("stat-both").textContent  = profiles.filter(p=>p.tag==="both").length;
  document.getElementById("stat-posts").textContent = posts.length;
  document.getElementById("tc-profiles").textContent = profiles.length;
  document.getElementById("tc-posts").textContent    = posts.length;
}

// ════════════════════════════════════════
//  PROFILES TAB
// ════════════════════════════════════════
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderProfiles();
}

function renderProfiles() {
  const grid  = document.getElementById("grid");
  const query = (document.getElementById("search-input").value||"").toLowerCase();
  updateStats();

  const filtered = profiles.filter(p => {
    const mf = activeFilter === "all" || p.tag === activeFilter;
    const ms = !query || p.name.toLowerCase().includes(query) || (p.notes||"").toLowerCase().includes(query);
    return mf && ms;
  });

  if (!filtered.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted);font-size:14px;">No profiles found.</div>`;
    return;
  }

  const postCountByProfile = {};
  posts.forEach(p => { postCountByProfile[p.profileId] = (postCountByProfile[p.profileId]||0)+1; });

  grid.innerHTML = filtered.map(p => {
    const pc = postCountByProfile[p.id] || 0;
    return `
    <div class="card" id="card-${p.id}">
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;">
          <div class="card-avatar">${initials(p.name)}</div>
          <div class="card-info">
            <input class="name-input" value="${escHtml(p.name)}" placeholder="Name"
              onchange="updateField(${p.id},'name',this.value)"
              oninput="updateAvatar(${p.id},this.value)"/>
          </div>
        </div>
        <div class="card-actions">
          ${pc > 0 ? `<button class="icon-btn posts-btn" title="View ${pc} saved posts" onclick="goToPosts(${p.id})">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </button>` : ''}
          <button class="icon-btn delete" title="Remove" onclick="deleteProfile(${p.id})">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>

      <div class="tag-row">
        <select class="tag-select ${p.tag}" onchange="updateField(${p.id},'tag',this.value);this.className='tag-select '+this.value">
          <option value="broad" ${p.tag==='broad'?'selected':''}>Broad Business</option>
          <option value="cpa"   ${p.tag==='cpa'  ?'selected':''}>CPA Niche</option>
          <option value="both"  ${p.tag==='both' ?'selected':''}>Both</option>
        </select>
        ${pc > 0 ? `<span onclick="goToPosts(${p.id})" class="view-posts-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          ${pc} saved post${pc>1?'s':''}
        </span>` : ''}
      </div>

      <div class="url-row">
        <input class="url-input" type="text" value="${escHtml(p.url||'')}" placeholder="https://linkedin.com/in/..."
          onchange="updateField(${p.id},'url',this.value);updateLink(${p.id},this.value)"
          id="url-${p.id}"/>
        <a class="li-link" href="${escHtml(p.url||'#')}" target="_blank" id="link-${p.id}" title="Open LinkedIn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-4 0v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>
        </a>
      </div>

      <div>
        <div class="notes-label">Notes</div>
        <textarea class="notes-textarea" placeholder="Hook styles, formats, what makes their content work..."
          onchange="updateField(${p.id},'notes',this.value)">${escHtml(p.notes||'')}</textarea>
      </div>
    </div>`;
  }).join("");
}

function goToPosts(profileId) {
  const postBtn = document.querySelectorAll(".tab-btn")[1];
  switchTab("posts", postBtn);
  setPostsProfileFilter(profileId, null);
  renderSidebar();
  renderPosts();
}

function updateField(id, field, value) {
  const p = profiles.find(p=>p.id===id);
  if (p) { p[field]=value; save(); updateStats(); }
}
function updateAvatar(id, name) {
  const el = document.querySelector(`#card-${id} .card-avatar`);
  if (el) el.textContent = initials(name||"?");
}
function updateLink(id, url) {
  const link = document.getElementById(`link-${id}`);
  if (link) link.href = url||"#";
}
function deleteProfile(id) {
  if (!confirm("Remove this profile?")) return;
  profiles = profiles.filter(p=>p.id!==id);
  save(); renderProfiles();
}

// ════════════════════════════════════════
//  POSTS TAB
// ════════════════════════════════════════
function renderSidebar() {
  const container = document.getElementById("sidebar-profiles");
  const postCountByProfile = {};
  posts.forEach(p => { postCountByProfile[p.profileId]=(postCountByProfile[p.profileId]||0)+1; });

  // Only show profiles that have posts
  const profilesWithPosts = profiles.filter(p => postCountByProfile[p.id]);

  document.getElementById("sc-all").textContent = posts.length;

  container.innerHTML = profilesWithPosts.map(p => {
    const cnt = postCountByProfile[p.id] || 0;
    const isActive = activePostsProfile == p.id;
    return `
    <div class="sidebar-profile ${isActive?'active':''}" data-profile-filter="${p.id}" onclick="setPostsProfileFilter(${p.id}, this)">
      <div class="sp-avatar">${initials(p.name)}</div>
      <div class="sp-name">${escHtml(p.name.split(' ')[0])}</div>
      <span class="sp-count">${cnt}</span>
    </div>`;
  }).join("");
}

function setPostsProfileFilter(profileId, btn) {
  activePostsProfile = profileId;
  document.querySelectorAll(".sidebar-profile").forEach(el => {
    el.classList.toggle("active", el.dataset.profileFilter == String(profileId));
  });
  renderPosts();
}

function setHookFilter(hook, btn) {
  activeHookFilter = hook;
  document.querySelectorAll(".hook-filter").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderPosts();
}

function buildHookFilters() {
  const hooks = [...new Set(posts.map(p=>p.hook).filter(Boolean))].sort();
  const container = document.getElementById("hook-filters");
  container.innerHTML = `<button class="hook-filter ${activeHookFilter==='all'?'active':''}" data-hook="all" onclick="setHookFilter('all',this)">All Hooks</button>` +
    hooks.map(h => `<button class="hook-filter ${activeHookFilter===h?'active':''}" data-hook="${escHtml(h)}" onclick="setHookFilter('${escHtml(h)}',this)">${escHtml(h)}</button>`).join("");
}

function renderPosts() {
  buildHookFilters();
  const list  = document.getElementById("posts-feed-list");
  const query = (document.getElementById("posts-search").value||"").toLowerCase();

  let filtered = posts.filter(p => {
    const mProfile = activePostsProfile === "all" || p.profileId == activePostsProfile;
    const mHook    = activeHookFilter   === "all" || p.hook === activeHookFilter;
    const mSearch  = !query || p.text.toLowerCase().includes(query) || p.profile.toLowerCase().includes(query) || (p.hook||"").toLowerCase().includes(query);
    return mProfile && mHook && mSearch;
  });

  if (!filtered.length) {
    list.innerHTML = `<div class="posts-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p>No posts found.</p>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(post => {
    const lines = post.text.split('\n').filter(l=>l.trim());
    const preview = lines.slice(0,3).join('\n');
    const isTruncatable = post.text.length > 280 || lines.length > 4;
    return `
    <div class="post-card" id="post-${post.id}">
      <div class="post-card-header">
        <div class="post-profile-avatar">${initials(post.profile)}</div>
        <div style="flex:1;min-width:0;">
          <div class="post-profile-name">${escHtml(post.profile)}</div>
          <div class="post-meta">
            <span class="post-tag ${post.tag}">${post.tag==='cpa'?'CPA Niche':post.tag==='broad'?'Broad Business':'Both'}</span>
            ${post.hook?`<span class="hook-badge">${escHtml(post.hook)}</span>`:''}
          </div>
        </div>
        <div class="post-date">${post.date||''}</div>
      </div>

      <div class="post-text ${isTruncatable?'collapsed':''}" id="pt-${post.id}">${escHtml(post.text)}</div>
      ${isTruncatable?`<button class="expand-btn" id="eb-${post.id}" onclick="toggleExpand('${post.id}')">Show more</button>`:''}

      <div class="post-footer">
        <span class="engagement-text">${escHtml(post.engagement||'')}</span>
        <a class="li-open-btn" href="${escHtml(post.url||'#')}" target="_blank">
          <svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-4 0v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>
          View on LinkedIn
        </a>
      </div>
    </div>`;
  }).join("");
}

function toggleExpand(id) {
  const el = document.getElementById("pt-" + id);
  const btn = document.getElementById("eb-" + id);
  if (!el || !btn) return;
  const collapsed = el.classList.contains("collapsed");
  el.classList.toggle("collapsed", !collapsed);
  btn.textContent = collapsed ? "Show less" : "Show more";
}

// ════════════════════════════════════════
//  MODAL
// ════════════════════════════════════════
function openModal() {
  ["m-name","m-url","m-notes"].forEach(id => document.getElementById(id).value="");
  document.getElementById("m-tag").value = "broad";
  document.getElementById("modal").classList.add("open");
  setTimeout(() => document.getElementById("m-name").focus(), 100);
}
function closeModal() {
  document.getElementById("modal").classList.remove("open");
}
function addProfile() {
  const name = document.getElementById("m-name").value.trim();
  if (!name) { document.getElementById("m-name").focus(); return; }
  profiles.push({ id: nextId++, name, url: document.getElementById("m-url").value.trim(), tag: document.getElementById("m-tag").value, notes: document.getElementById("m-notes").value.trim() });
  save(); renderProfiles(); closeModal();
}
document.getElementById("modal").addEventListener("click", e => { if(e.target===e.currentTarget) closeModal(); });
document.getElementById("modal").addEventListener("keydown", e => { if(e.key==="Enter") addProfile(); if(e.key==="Escape") closeModal(); });

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
load();
renderProfiles();
renderSidebar();
renderPosts();
</script>
</body>
</html>
